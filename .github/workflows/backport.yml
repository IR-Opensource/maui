name: .NET MAUI Build (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v3

      # 2. Setup .NET
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      # 3. Install workloads BEFORE restore (critical)
      - name: Install MAUI workloads
        run: |
          dotnet workload install android ios maccatalyst macos wasm-tools

      # 4. Restore AFTER workloads are installed
      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln

      # 5. Build
      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --configuration Release

name: .NET MAUI Build (Ubuntu)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Install Linux workloads
        run: |
          dotnet workload install android wasm-tools
          dotnet workload restore

      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln /p:EnableWindowsTargeting=true

      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --no-restore --configuration Release /p:EnableWindowsTargeting=true

name: Install .NET Workloads

on:
  workflow_dispatch:

jobs:
  setup-dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install .NET 9.0.312 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.312'

      - name: Install supported workloads
        run: |
          dotnet workload install android wasm-tools

      - name: Verify SDK & workloads
        run: |
          dotnet --info
          dotnet workload list

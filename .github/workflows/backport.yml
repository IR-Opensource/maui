name: .NET MAUI Build (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v3

      # 2. Use exact SDK from global.json
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: global.json

      # 3. Install ONLY supported workloads on Windows
      - name: Install workloads
        run: |
          dotnet workload install android wasm-tools

      # 4. Restore (skip iOS/macOS projects)
      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln

      # 5. Build (skip unsupported platforms)
      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --configuration Release

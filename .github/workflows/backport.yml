name: .NET MAUI Build (Windows)

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x  # stable version for MAUI

      # 3. Restore solution
      - name: Restore solution
        run: |
          dotnet restore ./Microsoft.Maui.sln

      # 4. Build full solution
      - name: Build solution
        run: |
          dotnet build ./Microsoft.Maui.sln --configuration Release

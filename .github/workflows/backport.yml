name: .NET MAUI Build (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Install Linux workloads
        run: |
          dotnet workload install android wasm-tools
          dotnet workload restore

      - name: Build Linux-compatible projects
        run: |
          # Build only projects that exist on Linux
          dotnet build ./src/Graphics/Graphics.csproj --configuration Release
          dotnet build ./src/BlazorWebView/BlazorWebView.csproj --configuration Release
          dotnet build ./src/Core/Core.csproj --configuration Release

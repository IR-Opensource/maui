name: .NET MAUI Build (Linux)

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup stable .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x  # stable version

      # 3. Install Linux-compatible workloads
      - name: Install workloads
        run: |
          dotnet workload install android wasm-tools
          dotnet workload restore

      # 4. Build only Linux-compatible projects
      - name: Build projects
        run: |
          dotnet build ./src/Graphics/Graphics.csproj --configuration Release
          dotnet build ./src/BlazorWebView/BlazorWebView.csproj --configuration Release
          dotnet build ./src/Core/Core.csproj --configuration Release

name: Install .NET Workloads

on:
  workflow_dispatch:

jobs:
  install-workloads:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          # Pick an installed SDK version, e.g., 10.0.x
          dotnet-version: '10.0.x'

      - name: Install supported workloads
        run: |
          # Only workloads that can be installed on Windows
          dotnet workload install android wasm-tools
          # Skip iOS/macOS/maccatalyst/tvOS

      - name: List installed workloads
        run: dotnet workload list

name: .NET MAUI Build

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x  # or whatever version you are using

      - name: Install required workloads
        run: |
          dotnet workload install android ios macos wasm-tools
          dotnet workload restore

      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln

      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --no-restore --configuration Release /p:EnableWindowsTargeting=true

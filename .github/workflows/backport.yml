name: .NET MAUI Windows Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: global.json

      - name: Install supported workloads
        run: |
          dotnet workload install android wasm-tools

      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln

      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --configuration Release --no-restore

name: NET Workloads XX IR

on:
  workflow_dispatch:

jobs:
  install-workloads:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: global.json

      - name: Install supported workloads
        run: |
          # Install workloads that work on Windows
          dotnet workload install android wasm-tools
          # Optionally install MAUI templates if Windows-compatible
          # dotnet workload install maui

      - name: List installed workloads
        run: dotnet workload list

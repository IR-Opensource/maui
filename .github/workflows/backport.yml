name: .NET MAUI Build (Linux)

on:
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      # 3. Install Linux-supported workloads
      - name: Install workloads
        run: |
          dotnet workload install android wasm-tools
          dotnet workload restore

      # 4. Build only real Linux-compatible projects (ignore .shproj)
      - name: Build projects
        run: |
          # Find all .csproj files, excluding .shproj or missing files
          find ./src -name "*.csproj" -print0 \
            | xargs -0 -n1 dotnet build --configuration Release

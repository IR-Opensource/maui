name: .NET MAUI Build (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v3

      # 2. Install EXACT SDK from global.json
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: global.json

      # 3. Install workloads (must be BEFORE restore)
      - name: Install MAUI workloads
        run: |
          dotnet workload install android ios maccatalyst macos wasm-tools

      # 4. Restore
      - name: Restore solution
        run: dotnet restore ./Microsoft.Maui.sln

      # 5. Build
      - name: Build solution
        run: dotnet build ./Microsoft.Maui.sln --configuration Release
